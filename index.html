<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Developer | Next Gen Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        :root { --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.1); --accent: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background: #020202; color: #f3f4f6; margin: 0; overflow: hidden; }
        .glass { background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--glass-border); }
        .liquid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 10% 10%, rgba(59, 130, 246, 0.1) 0%, transparent 50%), radial-gradient(circle at 90% 90%, rgba(139, 92, 246, 0.1) 0%, transparent 50%); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .nav-item.active { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border-left: 4px solid #3b82f6; }
        .btn-gradient { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        input, textarea, select { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); color: white; transition: all 0.2s; outline: none; }
        input:focus { border-color: var(--accent); }
        .animate-fade { animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .verified-badge { 
            position: relative; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            width: 14px; 
            height: 14px; 
            border-radius: 50%; 
            color: white; 
            font-size: 7px; 
            margin-left: 4px;
            vertical-align: middle;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        .ban-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .chat-msg-me { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); border-radius: 1.5rem 1.5rem 0.2rem 1.5rem; }
        .chat-msg-them { background: rgba(255,255,255,0.05); border-radius: 1.5rem 1.5rem 1.5rem 0.2rem; }
    </style>
</head>
<body class="custom-scrollbar">
    <div class="liquid-bg"></div>

    <!-- PANTALLA DE BLOQUEO -->
    <div id="ban-screen" class="ban-overlay hidden animate-fade">
        <div class="glass p-12 rounded-[3rem] max-w-lg w-full text-center">
            <i class="fas fa-gavel text-red-500 text-6xl mb-6"></i>
            <h2 id="ban-title" class="text-3xl font-black italic mb-2">ACCESO DENEGADO</h2>
            <p id="ban-message" class="text-gray-400 mb-6 text-sm"></p>
            <button onclick="logout()" class="mt-8 text-gray-600 hover:text-white uppercase font-black text-[10px]">Volver al Inicio</button>
        </div>
    </div>

    <div id="app">
        <!-- AUTH -->
        <section id="view-auth" class="min-h-screen flex items-center justify-center p-6 animate-fade">
            <div class="glass w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl">
                <div class="text-center mb-10">
                    <h1 class="text-4xl font-black italic tracking-tighter">CODE DEVELOPER</h1>
                    <p class="text-gray-500 text-[10px] font-black tracking-widest mt-2 uppercase" id="auth-mode-label">Terminal de Acceso</p>
                </div>
                
                <div class="space-y-4">
                    <div id="user-fields" class="space-y-4">
                        <div id="signup-extra-fields" class="hidden animate-fade">
                            <input type="text" id="reg-fullname" class="w-full rounded-2xl px-5 py-4 text-sm" placeholder="Nombre Real">
                        </div>
                        <input type="text" id="reg-user" class="w-full rounded-2xl px-5 py-4 text-sm" placeholder="Nombre de Usuario">
                        <input type="password" id="reg-pass" class="w-full rounded-2xl px-5 py-4 text-sm" placeholder="Contraseña">
                    </div>

                    <div id="admin-fields" class="hidden space-y-4">
                        <input type="text" id="admin-nro" class="w-full rounded-2xl px-5 py-4 text-sm" placeholder="Nro de Credencial">
                        <input type="password" id="admin-clave" class="w-full rounded-2xl px-5 py-4 text-sm" placeholder="Clave Maestra">
                    </div>

                    <button onclick="processAuth()" id="auth-main-btn" class="w-full btn-gradient py-4 rounded-2xl font-bold uppercase tracking-widest text-xs mt-2">Ingresar al Sistema</button>
                    
                    <div class="flex flex-col gap-3 mt-6 pt-6 border-t border-white/5">
                        <button onclick="toggleAuthMode()" id="auth-switch-btn" class="text-blue-500 text-[10px] font-black uppercase tracking-widest">¿No tienes cuenta? Regístrate</button>
                        <button onclick="toggleAdminMode()" id="admin-toggle-btn" class="text-gray-500 text-[10px] font-black uppercase tracking-widest">Acceso Administrativo</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- DASHBOARD -->
        <section id="view-dashboard" class="hidden h-screen flex">
            <!-- Sidebar -->
            <aside class="w-20 md:w-72 border-r border-white/5 flex flex-col bg-[#010101]">
                <div class="p-8">
                    <h2 class="font-black italic text-xl hidden md:block tracking-tighter">CODE DEV</h2>
                </div>
                <nav class="flex-1 px-4 space-y-2" id="main-nav"></nav>
                <div class="p-6 border-t border-white/5 space-y-4">
                    <button onclick="openChatInterface()" class="w-full flex items-center justify-center md:justify-start gap-4 p-4 text-blue-500 hover:text-white transition-all group">
                        <i class="fas fa-paper-plane text-lg group-hover:scale-110 transition-transform"></i>
                        <span class="hidden md:block font-black text-[10px] uppercase tracking-widest">Mensajes Directos</span>
                    </button>

                    <div class="h-px bg-white/5 my-2"></div>

                    <button onclick="switchTab('profile')" class="w-full glass p-3 rounded-2xl flex items-center gap-3 hover:bg-white/5 transition-all">
                        <div id="badge-avatar" class="w-10 h-10 min-w-[40px] rounded-full bg-blue-600 flex items-center justify-center font-black bg-cover bg-center overflow-hidden"></div>
                        <div class="hidden md:block overflow-hidden text-left">
                            <p id="badge-name" class="text-xs font-black truncate"></p>
                            <p class="text-[8px] text-blue-500 font-bold uppercase">Mi Perfil</p>
                        </div>
                    </button>
                    <button onclick="logout()" class="w-full text-center text-gray-600 hover:text-red-500 transition-all p-2">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="flex-1 overflow-y-auto custom-scrollbar bg-[#030303]" id="main-content"></main>
        </section>
    </div>

    <!-- CHAT INTERFACE OVERLAY -->
    <div id="chat-overlay" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-center justify-center p-4">
        <div class="glass w-full max-w-5xl h-[85vh] rounded-[3rem] flex overflow-hidden border-white/10 shadow-2xl">
            <div class="w-1/3 border-r border-white/5 flex flex-col bg-[#010101]/50">
                <div class="p-8 border-b border-white/5 flex justify-between items-center">
                    <h3 class="font-black text-xs uppercase tracking-[0.2em]">Bandeja de Entrada</h3>
                    <button onclick="closeChat()"><i class="fas fa-times text-gray-500 hover:text-white"></i></button>
                </div>
                <div id="chat-list" class="flex-1 overflow-y-auto custom-scrollbar py-2"></div>
            </div>
            <div class="flex-1 flex flex-col relative">
                <div id="chat-header" class="p-6 border-b border-white/5 flex items-center gap-4 bg-white/[0.02]">
                    <div class="text-gray-500 italic text-xs">Selecciona un desarrollador para chatear</div>
                </div>
                <div id="chat-messages" class="flex-1 overflow-y-auto p-8 space-y-4 custom-scrollbar bg-[#020202]"></div>
                <div id="chat-footer" class="p-6 border-t border-white/5 hidden bg-white/[0.02] flex flex-col gap-4">
                    <input type="text" id="chat-img" class="w-full rounded-xl px-4 py-2 text-[10px] glass italic" placeholder="URL de Foto (opcional)...">
                    <div class="flex gap-4">
                        <input type="text" id="chat-input" class="flex-1 rounded-2xl px-6 py-4 text-sm glass" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter') sendMessage()">
                        <button onclick="sendMessage()" class="w-14 h-14 btn-gradient rounded-full flex items-center justify-center">
                            <i class="fas fa-paper-plane text-sm"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- BASE DE DATOS ---
        const DB = {
            getUsers: () => JSON.parse(localStorage.getItem('cd_v4_users')) || [],
            saveUser: (u) => {
                const users = DB.getUsers();
                const i = users.findIndex(x => x.username === u.username);
                if(i > -1) {
                    users[i] = { ...users[i], ...u };
                } else {
                    users.push({
                        ...u,
                        registeredAt: new Date().toISOString(),
                        status: 'active',
                        isVerified: false,
                        verifyType: 'none',
                        followers: [],
                        following: [],
                        avatar: null
                    });
                }
                localStorage.setItem('cd_v4_users', JSON.stringify(users));
            },
            getPosts: () => JSON.parse(localStorage.getItem('cd_v4_posts')) || [],
            savePost: (p) => { 
                const posts = DB.getPosts(); 
                posts.unshift({
                    ...p,
                    id: 'post_' + Date.now(),
                    likes: [],
                    comments: [],
                    image: p.image || null
                });
                localStorage.setItem('cd_v4_posts', JSON.stringify(posts)); 
            },
            updatePost: (p) => {
                const posts = DB.getPosts();
                const i = posts.findIndex(x => x.id === p.id);
                if(i > -1) {
                    posts[i] = p;
                    localStorage.setItem('cd_v4_posts', JSON.stringify(posts));
                }
            },
            getMessages: () => JSON.parse(localStorage.getItem('cd_v4_chats')) || [],
            saveMessage: (msg) => { 
                const chats = DB.getMessages(); 
                chats.push({
                    ...msg,
                    id: 'msg_' + Date.now(),
                    image: msg.image || null
                });
                localStorage.setItem('cd_v4_chats', JSON.stringify(chats)); 
            }
        };

        // --- HELPERS ---
        function getBadgeHTML(u) {
            if(!u) return "";
            const type = (u.username === 'Admin_Master') ? 'admin' : (u.verifyType || (u.isVerified ? 'common' : 'none'));
            if(type === 'common') return '<span class="verified-badge bg-blue-500"><i class="fas fa-check"></i></span>';
            if(type === 'dev') return '<span class="verified-badge bg-orange-500"><i class="fas fa-hammer"></i></span>';
            if(type === 'admin') return '<span class="verified-badge bg-yellow-500 text-black"><i class="fas fa-star"></i></span>';
            return "";
        }

        // --- ESTADO ---
        let session = JSON.parse(sessionStorage.getItem('cd_session')) || null;
        let activeTab = 'feed';
        let currentChatUser = null;
        let currentProfileUser = null;
        let isAdminLogin = false;
        let isSignupMode = false;

        window.onload = () => { if(session) checkStatusAndShow(); };

        function checkStatusAndShow() {
            const users = DB.getUsers();
            const u = users.find(x => x.username === session.username);
            
            // Bypass para Admin o validación de usuario activo
            if(session.role !== 'admin') {
                if(!u || u.status !== 'active') {
                    document.getElementById('app').classList.add('hidden');
                    document.getElementById('ban-screen').classList.remove('hidden');
                    document.getElementById('ban-message').innerText = "Tu cuenta no está activa o ha sido restringida.";
                    return;
                }
            }
            showDashboard();
        }

        window.toggleAuthMode = () => {
            isSignupMode = !isSignupMode;
            document.getElementById('signup-extra-fields').classList.toggle('hidden');
            document.getElementById('auth-mode-label').innerText = isSignupMode ? "Registro de Terminal" : "Terminal de Acceso";
            document.getElementById('auth-main-btn').innerText = isSignupMode ? "Crear Cuenta" : "Ingresar al Sistema";
            document.getElementById('auth-switch-btn').innerText = isSignupMode ? "¿Ya tienes cuenta? Login" : "¿No tienes cuenta? Regístrate";
        };

        window.toggleAdminMode = () => {
            isAdminLogin = !isAdminLogin;
            document.getElementById('user-fields').classList.toggle('hidden');
            document.getElementById('admin-fields').classList.toggle('hidden');
            document.getElementById('admin-toggle-btn').innerText = isAdminLogin ? "Volver a Usuario" : "Acceso Administrativo";
        };

        window.processAuth = () => {
            if(isAdminLogin) {
                const nro = document.getElementById('admin-nro').value.trim();
                const clave = document.getElementById('admin-clave').value.trim();
                if(nro === "593-EC.dev" && clave === "24865139") {
                    session = { username: 'Admin_Master', role: 'admin' };
                    sessionStorage.setItem('cd_session', JSON.stringify(session));
                    location.reload();
                } else alert('Error: Credenciales administrativas inválidas.');
            } else {
                const u = document.getElementById('reg-user').value.trim();
                const p = document.getElementById('reg-pass').value.trim();
                const name = document.getElementById('reg-fullname').value.trim();
                
                if(!u || !p) return alert('Completa todos los campos.');

                const users = DB.getUsers();
                const userExists = users.find(x => x.username === u);

                if(isSignupMode) {
                    if(userExists) return alert('Usuario ya existe.');
                    if(!name) return alert('Ingresa tu nombre real.');
                    DB.saveUser({username: u, password: p, realName: name});
                    alert('¡Registro exitoso! Ahora inicia sesión.');
                    toggleAuthMode();
                } else {
                    if(!userExists || userExists.password !== p) return alert('Usuario o contraseña incorrectos.');
                    session = { username: u, role: 'user' };
                    sessionStorage.setItem('cd_session', JSON.stringify(session));
                    location.reload();
                }
            }
        };

        function showDashboard() {
            document.getElementById('view-auth').classList.add('hidden');
            document.getElementById('view-dashboard').classList.remove('hidden');
            const users = DB.getUsers();
            const me = users.find(x => x.username === session.username) || session;
            
            document.getElementById('badge-name').innerText = me.username;
            const av = document.getElementById('badge-avatar');
            if(me.avatar) { 
                av.style.backgroundImage = `url(${me.avatar})`; 
                av.innerText = ""; 
            } else { 
                av.innerText = me.username[0].toUpperCase(); 
                av.style.backgroundImage = "none";
            }
            renderNav();
            renderContent();
        }

        function renderNav() {
            const nav = document.getElementById('main-nav');
            const items = [{id:'feed', icon:'fa-home', label:'Inicio'}, {id:'search', icon:'fa-search', label:'Explorar'}];
            if(session.role === 'admin') items.push({id:'admin', icon:'fa-shield-halved', label:'Admin'});
            
            nav.innerHTML = items.map(i => `
                <button onclick="switchTab('${i.id}')" class="nav-item w-full flex items-center gap-4 p-4 rounded-2xl transition-all ${activeTab === i.id ? 'active' : 'text-gray-500 hover:text-white'}">
                    <i class="fas ${i.icon} w-5"></i>
                    <span class="hidden md:block font-black text-[10px] uppercase tracking-widest">${i.label}</span>
                </button>
            `).join('');
        }

        window.switchTab = (id) => { activeTab = id; renderNav(); renderContent(); };

        function renderContent() {
            const main = document.getElementById('main-content');
            main.innerHTML = "";
            const users = DB.getUsers();

            if(activeTab === 'feed') {
                main.innerHTML = `<div class="max-w-xl mx-auto py-10 space-y-8 px-4">
                    <h2 class="text-3xl font-black italic">FEED</h2>
                    <div class="glass p-8 rounded-[2.5rem] flex flex-col gap-4">
                        <textarea id="p-text" class="w-full bg-transparent border-none text-base h-24 focus:ring-0 resize-none" placeholder="¿Qué estás programando hoy?"></textarea>
                        <input type="text" id="p-img" class="w-full rounded-xl px-4 py-2 text-[10px] glass italic" placeholder="URL de Imagen (opcional)...">
                        <div class="flex justify-end pt-4 border-t border-white/5">
                            <button onclick="publish()" class="btn-gradient px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest">Publicar</button>
                        </div>
                    </div>
                    <div id="feed-cont" class="space-y-6"></div>
                </div>`;
                const posts = DB.getPosts();
                document.getElementById('feed-cont').innerHTML = posts.map(p => renderPostCard(p, users)).join('');
            }

            if(activeTab === 'search') {
                main.innerHTML = `<div class="max-w-2xl mx-auto py-10 px-4">
                    <h2 class="text-3xl font-black italic mb-8">BUSCAR</h2>
                    <div class="relative mb-10">
                        <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="text" oninput="searchUsers(this.value)" class="w-full glass rounded-full pl-16 pr-8 py-5 text-sm" placeholder="Buscar desarrolladores...">
                    </div>
                    <div id="search-res" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>`;
            }

            if(activeTab === 'admin') {
                main.innerHTML = `<div class="p-10 max-w-5xl mx-auto space-y-10">
                    <h2 class="text-3xl font-black italic">CONTROL</h2>
                    <div class="glass rounded-[2.5rem] overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-white/5 text-[10px] font-black text-gray-500">
                                <tr><th class="p-6">Usuario</th><th class="p-6">Estado</th><th class="p-6 text-right">Acciones</th></tr>
                            </thead>
                            <tbody>${users.map(u => `
                                <tr class="border-t border-white/5">
                                    <td class="p-6">
                                        <div class="flex items-center gap-3">
                                            <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-[10px] font-black bg-cover bg-center" style="${u.avatar ? `background-image:url(${u.avatar})`:''}">${u.avatar ? '':u.username[0]}</div>
                                            <span class="font-bold text-sm flex items-center">${u.username}${getBadgeHTML(u)}</span>
                                        </div>
                                    </td>
                                    <td class="p-6"><span class="text-[9px] font-black uppercase ${u.status === 'active' ? 'text-green-500':'text-red-500'}">${u.status}</span></td>
                                    <td class="p-6 text-right space-x-2 relative">
                                        <button onclick="toggleVerifyMenu('${u.username}')" class="w-8 h-8 rounded-lg bg-white/10 hover:bg-blue-600 transition-colors"><i class="fas fa-plus text-[10px]"></i></button>
                                        <div id="v-menu-${u.username}" class="hidden absolute right-14 top-4 glass rounded-xl p-2 z-50 flex flex-col gap-1 min-w-[120px]">
                                            <button onclick="setVerifyType('${u.username}', 'none')" class="text-[8px] font-black uppercase p-2 hover:bg-white/5 rounded-lg text-left">Quitar</button>
                                            <button onclick="setVerifyType('${u.username}', 'common')" class="text-[8px] font-black uppercase p-2 hover:bg-white/5 rounded-lg text-left">Común</button>
                                            <button onclick="setVerifyType('${u.username}', 'dev')" class="text-[8px] font-black uppercase p-2 hover:bg-white/5 rounded-lg text-left">Developer</button>
                                            <button onclick="setVerifyType('${u.username}', 'admin')" class="text-[8px] font-black uppercase p-2 hover:bg-white/5 rounded-lg text-left">Admin</button>
                                        </div>
                                        <button onclick="ban('${u.username}')" class="w-8 h-8 rounded-lg bg-red-500/20 text-red-500"><i class="fas fa-ban text-[10px]"></i></button>
                                    </td>
                                </tr>
                            `).join('')}</tbody>
                        </table>
                    </div>
                </div>`;
            }

            if(activeTab === 'profile') viewProfile(session.username);
        }

        window.viewProfile = (username) => {
            currentProfileUser = username;
            const users = DB.getUsers();
            let u = users.find(x => x.username === username);
            if(!u && username === 'Admin_Master') {
                u = { username: 'Admin_Master', realName: 'System Administrator', isVerified: true, verifyType: 'admin', avatar: null, followers: [] };
            }
            if(!u) return;
            const isMe = session.username === username;
            const posts = DB.getPosts().filter(p => p.author === username);
            activeTab = 'view_profile';
            document.getElementById('main-content').innerHTML = `
                <div class="max-w-2xl mx-auto py-10 px-4 animate-fade">
                    <div class="glass p-12 rounded-[3.5rem] text-center mb-10">
                        <div class="w-32 h-32 rounded-full bg-blue-600 mx-auto mb-6 bg-cover bg-center flex items-center justify-center text-4xl font-black shadow-2xl" style="${u.avatar ? `background-image:url(${u.avatar})`:''}">${u.avatar ? '':u.username[0]}</div>
                        <h2 class="text-3xl font-black italic flex items-center justify-center">${u.username}${getBadgeHTML(u)}</h2>
                        <p class="text-xs text-gray-500 uppercase font-black tracking-widest mt-1">${u.realName || 'Sin nombre'}</p>
                        <div class="flex justify-center gap-10 my-8">
                            <div><p class="text-xl font-black">${posts.length}</p><p class="text-[8px] uppercase text-gray-500 font-black">Posts</p></div>
                            <div><p class="text-xl font-black">${u.followers?.length || 0}</p><p class="text-[8px] uppercase text-gray-500 font-black">Seguidores</p></div>
                        </div>
                        <div class="flex gap-4 justify-center">
                            ${!isMe ? `
                                <button onclick="alert('Siguiendo...')" class="btn-gradient px-8 py-3 rounded-xl text-[10px] font-black uppercase">Seguir</button>
                                <button onclick="openChatInterface('${u.username}')" class="glass px-8 py-3 rounded-xl text-[10px] font-black uppercase">Mensaje</button>
                            ` : `<button onclick="openEditProfile()" class="glass px-8 py-3 rounded-xl text-[10px] font-black uppercase">Editar Perfil</button>`}
                        </div>
                    </div>

                    ${isMe ? `
                        <div class="glass p-8 rounded-[2.5rem] mb-10 flex flex-col gap-4">
                            <textarea id="p-text" class="w-full bg-transparent border-none text-base h-24 focus:ring-0 resize-none" placeholder="¿Qué estás programando hoy?"></textarea>
                            <input type="text" id="p-img" class="w-full rounded-xl px-4 py-2 text-[10px] glass italic" placeholder="URL de Imagen (opcional)...">
                            <div class="flex justify-end pt-4 border-t border-white/5">
                                <button onclick="publish()" class="btn-gradient px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest">Publicar</button>
                            </div>
                        </div>
                    ` : ''}

                    <div class="space-y-8">
                        ${posts.map(p => renderPostCard(p, users)).join('')}
                    </div>
                </div>`;
        };

        window.openEditProfile = () => {
            const users = DB.getUsers();
            const me = users.find(x => x.username === session.username);
            if(!me) return alert("Los administradores maestros no pueden ser editados localmente.");

            document.getElementById('main-content').innerHTML = `
                <div class="max-w-md mx-auto py-20 px-4 animate-fade">
                    <div class="glass p-10 rounded-[3rem] space-y-6">
                        <h2 class="text-2xl font-black italic mb-8">EDITAR PERFIL</h2>
                        <div class="space-y-4">
                            <input type="text" id="edit-avatar" class="w-full rounded-2xl px-5 py-4 text-sm" placeholder="URL Nueva Foto Perfil" value="${me.avatar || ''}">
                            <input type="text" id="edit-user" class="w-full rounded-2xl px-5 py-4 text-sm" placeholder="Nuevo Usuario" value="${me.username}">
                            <input type="password" id="edit-newpass" class="w-full rounded-2xl px-5 py-4 text-sm" placeholder="Nueva Contraseña (opcional)">
                            <div class="pt-4 border-t border-white/5">
                                <p class="text-[9px] font-black text-gray-500 uppercase mb-2">Confirmar Cambios</p>
                                <input type="password" id="edit-currpass" class="w-full rounded-2xl px-5 py-4 text-sm border-blue-500/50" placeholder="Contraseña Actual">
                            </div>
                            <button onclick="saveProfile()" class="w-full btn-gradient py-4 rounded-2xl font-bold uppercase tracking-widest text-xs">Guardar Cambios</button>
                            <button onclick="viewProfile(session.username)" class="w-full text-gray-500 text-[10px] font-black uppercase">Cancelar</button>
                        </div>
                    </div>
                </div>`;
        };

        window.saveProfile = () => {
            const users = DB.getUsers();
            const me = users.find(x => x.username === session.username);
            const currPass = document.getElementById('edit-currpass').value;

            if(currPass !== me.password) return alert("Contraseña actual incorrecta.");

            const newUser = document.getElementById('edit-user').value.trim();
            const newPass = document.getElementById('edit-newpass').value.trim();
            const newAv = document.getElementById('edit-avatar').value.trim();

            if(!newUser) return alert("El nombre de usuario no puede estar vacío.");

            // Si cambia el username, actualizar sesión y posts
            if(newUser !== me.username) {
                if(users.find(x => x.username === newUser)) return alert("El nombre de usuario ya está en uso.");
                // Actualizar posts
                const posts = DB.getPosts();
                posts.forEach(p => { if(p.author === me.username) p.author = newUser; });
                localStorage.setItem('cd_v4_posts', JSON.stringify(posts));
                // Actualizar mensajes
                const chats = DB.getMessages();
                chats.forEach(m => {
                    if(m.from === me.username) m.from = newUser;
                    if(m.to === me.username) m.to = newUser;
                });
                localStorage.setItem('cd_v4_chats', JSON.stringify(chats));

                session.username = newUser;
                sessionStorage.setItem('cd_session', JSON.stringify(session));
            }

            me.username = newUser;
            if(newPass) me.password = newPass;
            me.avatar = newAv;

            DB.saveUser(me);
            alert("Perfil actualizado exitosamente.");
            location.reload();
        };

        window.searchUsers = (q) => {
            const res = document.getElementById('search-res');
            if(!q) return res.innerHTML = "";
            const filtered = DB.getUsers().filter(u => u.username.toLowerCase().includes(q.toLowerCase()));
            res.innerHTML = filtered.map(u => `
                <div onclick="viewProfile('${u.username}')" class="glass p-4 rounded-2xl flex items-center gap-4 cursor-pointer hover:bg-white/5">
                    <div class="w-10 h-10 rounded-full bg-blue-600 bg-cover bg-center flex items-center justify-center font-black" style="${u.avatar ? `background-image:url(${u.avatar})`:''}">${u.avatar ? '':u.username[0]}</div>
                    <div class="flex-1">
                        <p class="text-sm font-bold flex items-center">${u.username}${getBadgeHTML(u)}</p>
                        <p class="text-[8px] text-gray-500 font-black">${u.realName || ''}</p>
                    </div>
                    ${session.role === 'admin' ? `
                        <button onclick="event.stopPropagation(); switchTab('admin')" class="text-blue-500 text-[10px] font-black uppercase">Gestionar</button>
                    ` : ''}
                </div>`).join('');
        };

        window.openChatInterface = (target = null) => {
            document.getElementById('chat-overlay').classList.remove('hidden');
            if(target) selectChat(target);
            renderChatList();
        };
        window.closeChat = () => document.getElementById('chat-overlay').classList.add('hidden');

        function renderChatList() {
            const list = document.getElementById('chat-list');
            const users = DB.getUsers().filter(u => u.username !== session.username);
            list.innerHTML = users.map(u => `
                <div onclick="selectChat('${u.username}')" class="p-5 flex items-center gap-4 cursor-pointer ${currentChatUser === u.username ? 'bg-white/5':''}">
                    <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-black bg-cover bg-center" style="${u.avatar ? `background-image:url(${u.avatar})`:''}">${u.avatar ? '':u.username[0]}</div>
                    <p class="text-sm font-bold truncate flex items-center">${u.username}${getBadgeHTML(u)}</p>
                </div>`).join('');
        }

        window.selectChat = (user) => { 
            currentChatUser = user; 
            renderChatList(); 
            document.getElementById('chat-footer').classList.remove('hidden');
            const target = DB.getUsers().find(u => u.username === user);
            document.getElementById('chat-header').innerHTML = `<p class="font-black text-xs uppercase tracking-widest">${user}</p>`;
            loadMessages(); 
        };

        function loadMessages() {
            const cont = document.getElementById('chat-messages');
            const msgs = DB.getMessages().filter(m => (m.from === session.username && m.to === currentChatUser) || (m.from === currentChatUser && m.to === session.username));
            cont.innerHTML = msgs.map(m => `
                <div class="flex ${m.from === session.username ? 'justify-end':'justify-start'} animate-fade">
                    <div class="${m.from === session.username ? 'chat-msg-me':'chat-msg-them'} px-5 py-3 text-sm max-w-[80%]">
                        ${m.image ? `<img src="${m.image}" class="rounded-xl mb-3 max-h-60 w-full object-cover border border-white/10 shadow-xl">` : ''}
                        <p>${m.text}</p>
                    </div>
                </div>`).join('');
            cont.scrollTop = cont.scrollHeight;
        }

        window.sendMessage = () => {
            const inp = document.getElementById('chat-input');
            const img = document.getElementById('chat-img');
            if(!inp.value.trim() && !img.value.trim()) return;
            DB.saveMessage({ from: session.username, to: currentChatUser, text: inp.value.trim(), image: img.value.trim(), time: Date.now() });
            inp.value = "";
            img.value = "";
            loadMessages();
        };

        window.toggleVerifyMenu = (username) => {
            const el = document.getElementById(`v-menu-${username}`);
            el.classList.toggle('hidden');
        };

        window.setVerifyType = (username, type) => {
            const users = DB.getUsers();
            const u = users.find(x => x.username === username);
            if(u) {
                u.verifyType = type;
                u.isVerified = (type !== 'none');
                DB.saveUser(u);
                renderContent();
            }
        };

        window.toggleVerify = (username) => {
            const users = DB.getUsers();
            const u = users.find(x => x.username === username);
            if(u) { u.isVerified = !u.isVerified; u.verifyType = u.isVerified ? 'common':'none'; DB.saveUser(u); renderContent(); }
        };

        window.ban = (username) => {
            const users = DB.getUsers();
            const u = users.find(x => x.username === username);
            if(u) { u.status = 'banned'; localStorage.setItem('cd_v4_users', JSON.stringify(users)); renderContent(); }
        };

        window.publish = () => {
            const txt = document.getElementById('p-text').value.trim();
            const img = document.getElementById('p-img') ? document.getElementById('p-img').value.trim() : "";
            if(!txt && !img) return;
            DB.savePost({author: session.username, content: txt, image: img, timestamp: Date.now()});
            document.getElementById('p-text').value = "";
            if(document.getElementById('p-img')) document.getElementById('p-img').value = "";
            renderContent();
            if(activeTab === 'view_profile') viewProfile(currentProfileUser);
        };

        function renderPostCard(p, users) {
            const author = users.find(u => u.username === p.author) || { username: p.author };
            const isLiked = p.likes?.includes(session.username);
            return `
            <div class="glass p-8 rounded-[2.5rem] animate-fade space-y-4">
                <div class="flex items-center gap-4 mb-4 cursor-pointer" onclick="viewProfile('${p.author}')">
                    <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-black bg-cover bg-center" style="${author?.avatar ? `background-image:url(${author.avatar})`:''}">${author?.avatar ? '':p.author[0]}</div>
                    <div>
                        <span class="font-bold text-sm block flex items-center">${p.author}${getBadgeHTML(author)}</span>
                        <span class="text-[9px] text-gray-500 uppercase font-black">${author?.realName || 'Dev'}</span>
                    </div>
                </div>
                <p class="text-gray-300 text-sm">${p.content}</p>
                ${p.image ? `<img src="${p.image}" class="w-full rounded-3xl border border-white/5 shadow-2xl max-h-[400px] object-cover">` : ''}

                <div class="flex items-center gap-6 pt-4 border-t border-white/5">
                    <button onclick="toggleLike('${p.id}')" class="flex items-center gap-2 ${isLiked ? 'text-blue-500':'text-gray-500'} hover:text-blue-400 transition-colors">
                        <i class="${isLiked ? 'fas':'far'} fa-heart"></i>
                        <span class="text-[10px] font-black">${p.likes?.length || 0}</span>
                    </button>
                    <button onclick="focusComment('${p.id}')" class="flex items-center gap-2 text-gray-500 hover:text-white transition-colors">
                        <i class="far fa-comment"></i>
                        <span class="text-[10px] font-black">${p.comments?.length || 0}</span>
                    </button>
                </div>

                <div class="space-y-3 pt-4">
                    ${p.comments?.map(c => `
                        <div class="flex gap-3 text-[11px]">
                            <span class="font-black text-blue-500">${c.user}:</span>
                            <span class="text-gray-400">${c.text}</span>
                        </div>
                    `).join('')}
                    <div class="flex gap-2 mt-4">
                        <input type="text" id="cmt-input-${p.id}" class="flex-1 glass rounded-xl px-4 py-2 text-[10px]" placeholder="Escribe un comentario..." onkeypress="if(event.key==='Enter') addComment('${p.id}')">
                        <button onclick="addComment('${p.id}')" class="text-blue-500 text-[10px] font-black uppercase">Post</button>
                    </div>
                </div>
            </div>`;
        }

        window.toggleLike = (postId) => {
            const posts = DB.getPosts();
            const p = posts.find(x => x.id === postId);
            if(!p) return;
            if(!p.likes) p.likes = [];
            const idx = p.likes.indexOf(session.username);
            if(idx > -1) p.likes.splice(idx, 1);
            else p.likes.push(session.username);
            DB.updatePost(p);
            renderContent();
            if(activeTab === 'view_profile') viewProfile(currentProfileUser);
        };

        window.addComment = (postId) => {
            const inp = document.getElementById(`cmt-input-${postId}`);
            if(!inp.value.trim()) return;
            const posts = DB.getPosts();
            const p = posts.find(x => x.id === postId);
            if(!p) return;
            if(!p.comments) p.comments = [];
            p.comments.push({ user: session.username, text: inp.value.trim(), time: Date.now() });
            DB.updatePost(p);
            inp.value = "";
            renderContent();
            if(activeTab === 'view_profile') viewProfile(currentProfileUser);
        };

        window.focusComment = (postId) => document.getElementById(`cmt-input-${postId}`).focus();

        window.logout = () => { sessionStorage.clear(); location.reload(); };
    </script>
</body>
</html>
